<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Students | Admin Panel</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      .sidebar-gradient {
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      }
      .header-shadow {
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="bg-gray-50 font-sans antialiased">
    <div class="min-h-screen flex">

      <!-- SIDEBAR -->
      <aside
        id="sidebar"
        class="fixed lg:static z-40 top-0 left-0 w-72 h-full sidebar-gradient text-white flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300"
      >
        <div class="p-6 border-b border-slate-700 text-center">
          <div class="w-20 h-20 mx-auto mb-3 bg-white rounded-full p-1 overflow-hidden border-2 border-emerald-500">
            <img src="files/logoSc.jpg" class="w-full h-full object-cover transform scale-125" />
          </div>
          <h1 class="text-xs font-bold text-emerald-400 uppercase tracking-widest leading-tight">
            Jamia Tarbia Tul Banat Society
          </h1>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
          <a href="#" class="flex items-center gap-3 p-3 text-slate-300 hover:bg-slate-800 rounded-xl">
            <i class="fas fa-th-large w-5"></i> Dashboard
          </a>
          <a href="#" class="flex items-center gap-3 p-3 bg-emerald-600 rounded-xl text-white">
            <i class="fas fa-user-graduate w-5"></i> Admissions
          </a>
        </nav>

        <div class="p-4 border-t border-slate-700">
          <button class="w-full p-3 bg-red-500/10 text-red-400 rounded-xl">
            Logout
          </button>
        </div>
      </aside>

      <div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden"></div>

      <!-- MAIN CONTENT -->
      <div class="flex-1 flex flex-col min-w-0">

        <!-- HEADER -->
        <header class="bg-white header-shadow sticky top-0 z-30 h-20 flex items-center px-4 md:px-8">
          <button id="menu-btn" class="lg:hidden p-2 mr-4 text-slate-600">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <h2 class="text-lg font-bold text-slate-800 uppercase">
            Registered Student Logins
          </h2>
        </header>

        <!-- MAIN (FIXED HEIGHT) -->
        <main class="p-4 md:p-8 h-[calc(100vh-80px)] overflow-hidden">

          <!-- CARD -->
          <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 h-full flex flex-col">

            <!-- SCROLL AREA -->
            <div class="overflow-x-auto overflow-y-auto flex-1 custom-scrollbar">

              <table class="w-full text-left">
                
                <!-- STICKY HEADER -->
                <thead class="sticky top-0 bg-slate-50 z-10">
                  <tr class="border-b">
                    <th class="p-5 text-[10px] font-black uppercase text-slate-500">Login ID</th>
                    <th class="p-5 text-[10px] font-black uppercase text-slate-500">Email Address</th>
                    <th class="p-5 text-[10px] font-black uppercase text-slate-500">Created Date</th>
                    <th class="p-5 text-[10px] font-black uppercase text-slate-500 text-center">Actions</th>
                  </tr>
                </thead>

                <tbody id="auth-student-list" class="divide-y divide-slate-50"></tbody>
              </table>

              <!-- LOADING -->
              <div id="loading-trigger" class="py-10 text-center text-slate-400 flex flex-col items-center gap-2">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"></div>
                <p class="text-xs font-bold uppercase tracking-widest">
                  Loading more records...
                </p>
              </div>

            </div>
          </div>

        </main>
      </div>
    </div>

    <script>
      const API = "https://dramatic-carrying-islamic-tri.trycloudflare.com/student";

      let currentPage = 1;
      let isLoading = false;
      let hasMore = true;
      const limit = 10;

      const studentList = document.getElementById("auth-student-list");
      const loadingTrigger = document.getElementById("loading-trigger");

      async function fetchAuthStudents() {
        if (isLoading || !hasMore) return;

        isLoading = true;

        try {
          const res = await fetch(`${API}/all?page=${currentPage}&limit=${limit}`);
          const result = await res.json();

          if (result.success) {
            if (result.data.length < limit) {
              hasMore = false;
              loadingTrigger.innerHTML = "<p class='text-xs font-bold text-slate-400 uppercase'>All records loaded</p>";
            }

            renderData(result.data);
            currentPage++;
          }
        } catch (err) {
          console.error("Fetch Error:", err);
        } finally {
          isLoading = false;
        }
      }

      function renderData(data) {
        data.forEach((item) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td class="p-5">
              <span class="px-3 py-1 bg-slate-100 rounded-full text-xs font-bold">#${item.id}</span>
            </td>
            <td class="p-5">
              <p class="font-bold">${item.email}</p>
            </td>
            <td class="p-5">
              <span class="text-xs">${new Date(item.createdAt).toLocaleDateString()}</span>
            </td>
            <td class="p-5 text-center">
              <button onclick="deleteAuth(${item.id})" class="w-9 h-9 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          `;

          studentList.appendChild(row);
        });
      }

      async function deleteAuth(id) {
        if (!confirm("Delete?")) return;

        await fetch(`${API}/delete/${id}`, { method: "DELETE" });
        location.reload();
      }

      // INTERSECTION OBSERVER (SCROLL AREA FIX)
      const observer = new IntersectionObserver(
        (entries) => {
          if (entries[0].isIntersecting) {
            fetchAuthStudents();
          }
        },
        {
          root: document.querySelector(".custom-scrollbar"),
          threshold: 1.0,
        }
      );

      observer.observe(loadingTrigger);

      fetchAuthStudents();

      // SIDEBAR
      const menuBtn = document.getElementById("menu-btn");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
      });
    </script>
  </body>
</html>
