<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | JTBS Society</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .header-shadow { box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex">

    <aside id="sidebar" class="fixed lg:static z-50 top-0 left-0 w-72 h-full sidebar-gradient text-white flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-slate-700 text-center">
            <div class="w-20 h-20 mx-auto mb-3 bg-white rounded-full p-1 overflow-hidden border-2 border-emerald-500">
                <img src="./files/logoSc.jpg" class="w-full h-full object-contain" />
            </div>
            <h1 class="text-xs font-bold text-emerald-400 uppercase tracking-widest leading-tight">
                Jamia Tarbia Tul Banat Society
            </h1>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="mainAdmission.html" class="flex items-center gap-3 p-3 bg-emerald-600 rounded-xl">
                <i class="fas fa-user-graduate"></i> Admissions
            </a>
            <a href="main_StuAttendance.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl">
                <i class="fas fa-calendar-check"></i> Attendance
            </a>
            <a href="mainfeeTransaction.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl">
                <i class="fas fa-receipt"></i> Fee Transactions
            </a>
            <a href="mainBank.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl">
                <i class="fas fa-university"></i> Bank Accounts
            </a>
            <a href="#" class="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl">
                <i class="fas fa-wallet"></i> School Expenses
            </a>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <button onclick="logout()" class="w-full p-3 bg-red-500/10 text-red-400 rounded-xl font-bold">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"></div>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="bg-white header-shadow sticky top-0 z-30 h-20 flex items-center px-4 md:px-8">
            <button id="menu-btn" class="lg:hidden p-2 mr-4 text-slate-600"><i class="fas fa-bars text-xl"></i></button>
            <div class="flex-1">
                <h2 class="text-sm md:text-lg font-bold text-slate-800 uppercase">JAMIA TARBIA TUL BANAT SOCIETY JAJOR</h2>
                <p class="text-[10px] md:text-xs text-slate-500 flex items-center gap-1">
                    <i class="fas fa-map-marker-alt text-emerald-500"></i> DISTRICT KHAIRTHAL-TIJARA, RAJASTHAN
                </p>
            </div>
        </header>

        <main class="flex-1 flex items-center justify-center p-4">
            <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-10 border border-slate-100 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-50 rounded-full"></div>

                <div id="auth-box">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-black text-slate-800">Student Sign In</h2>
                    </div>
                    <form id="loginForm" class="space-y-4">
                        <input type="email" id="email" placeholder="student@example.com" required 
                            class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all" />
                        <input type="password" id="password" placeholder="••••••••" required 
                            class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all" />
                        <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition shadow-lg">
                            Send OTP Code
                        </button>
                    </form>
                </div>

                <div id="otp-box" class="hidden">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-black text-slate-800">Verify OTP</h2>
                        <p class="text-xs text-slate-500 mt-1" id="otp-info"></p>
                    </div>
                    <form id="otpForm" class="space-y-4">
                        <input type="text" id="otp" placeholder="000000" maxlength="6" 
                            class="w-full p-4 text-center text-3xl border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold" />
                        <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold hover:bg-emerald-700 transition">
                            Verify & Access Profile
                        </button>
                    </form>
                    <div class="mt-6 text-center">
                        <p class="text-[11px] text-slate-400 mb-2 font-medium">Didn't receive the code?</p>
                        <button id="resendBtn" class="text-emerald-600 font-black text-xs uppercase tracking-widest hover:underline disabled:text-slate-400 disabled:no-underline" disabled>
                            Resend OTP in <span id="timer">30</span>s
                        </button>
                    </div>
                </div>
                
                <div id="msg" class="mt-4 text-center hidden p-3 rounded-xl text-sm font-bold shadow-sm"></div>
            </div>
        </main>
    </div>
</div>

<script>
    const API = "https://photography-zero-reveal-ashley.trycloudflare.com/student";
    let userEmail = "";
    let timerId = null;

    // Sidebar logic (No Change)
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    
    menuBtn.addEventListener("click", () => { 
        sidebar.classList.toggle("-translate-x-full"); 
        overlay.classList.toggle("hidden"); 
    });
    
    overlay.addEventListener("click", () => { 
        sidebar.classList.add("-translate-x-full"); 
        overlay.classList.add("hidden"); 
    });

    // Utility: Show message
    function showMsg(text, isError = true) {
        const msgDiv = document.getElementById("msg");
        msgDiv.innerText = text;
        msgDiv.className = `mt-4 text-center p-3 rounded-xl text-sm font-bold block ${isError ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-700'}`;
        msgDiv.classList.remove("hidden");
    }

    // OTP Resend Timer Fix
    function startTimer() {
        let timeLeft = 30;
        const btn = document.getElementById("resendBtn");
        const timerSpan = document.getElementById("timer");
        
        btn.disabled = true;
        if(timerSpan) timerSpan.innerText = timeLeft;
        
        if(timerId) clearInterval(timerId);

        timerId = setInterval(() => {
            timeLeft--;
            if(timerSpan) timerSpan.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timerId);
                btn.disabled = false;
                btn.innerHTML = "Resend OTP Now";
                // Add event listener here to avoid undefined issues
                btn.onclick = resendOtp;
            }
        }, 1000);
    }

    // Resend OTP Action
    async function resendOtp() {
        if (!userEmail) return showMsg("Email not found. Please login again.");
        
        try {
            const res = await fetch(`${API}/resend-otp`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: userEmail }),
            });
            const data = await res.json();
            if (res.ok) {
                showMsg(data.message || "OTP Resent Successfully", false);
                startTimer();
            } else { 
                showMsg(data.message || "Failed to resend"); 
            }
        } catch (err) { 
            showMsg("Network error during resend"); 
        }
    }

    // Login Form Submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        userEmail = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
            const res = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: userEmail, password }),
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById("auth-box").classList.add("hidden");
                document.getElementById("otp-box").classList.remove("hidden");
                document.getElementById("otp-info").innerText = "Sent to: " + userEmail;
                startTimer();
            } else { 
                showMsg(data.message || "Invalid credentials"); 
            }
        } catch (err) { 
            showMsg("Connection failed to server"); 
        }
    });

    // Verify OTP Submit
    document.getElementById("otpForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const otp = document.getElementById("otp").value.trim();
        
        try {
            const res = await fetch(`${API}/login-verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: userEmail, otp }),
            });
            const data = await res.json();
            
            if (res.ok) {
                if (data.admission) {
                    sessionStorage.setItem("tempStudentData", JSON.stringify(data.admission));
                    window.location.href = "student_profile.html";
                } else {
                    alert("No admission found. Redirecting to form...");
                    sessionStorage.setItem("userEmail", userEmail);
                    window.location.href = "admission_form.html";
                }
            } else { 
                showMsg(data.message || "Invalid OTP code"); 
            }
        } catch (err) { 
            showMsg("Verification process failed"); 
        }
    });

    function logout() { 
        localStorage.clear(); 
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
