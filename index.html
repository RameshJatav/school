<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-login {
            background-image: url('https://image-static.collegedunia.com/public/college_data/images/campusimage/1427110483img030.jpg'); 
            background-size: cover;
            background-position: center;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased">

    <div class="min-h-screen bg-login flex items-center justify-center p-4 relative">
        <div class="absolute inset-0 bg-slate-900/60"></div>

        <div class="relative z-10 w-full max-w-md">
            <div class="glass-effect rounded-[2rem] shadow-2xl overflow-hidden">
                <div class="p-8 text-center border-b border-gray-100">
                    <div class="w-16 h-16 bg-emerald-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                        <i class="fas fa-user-shield text-white text-2xl"></i>
                    </div>
                    <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">JTBS Admin Login</h1>
                    <p class="text-[10px] text-emerald-600 font-bold mt-1 tracking-widest uppercase italic">AmiTech Solutions Management</p>
                </div>

                <div class="p-8">
                    <form id="adminLoginForm" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Email Address</label>
                            <input type="email" id="email" required class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm font-bold" placeholder="admin@example.com">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Password</label>
                            <input type="password" id="password" required class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm font-bold" placeholder="••••••••">
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3 text-xs tracking-widest">
                            <span id="btnText">AUTHENTICATE</span>
                            <i id="btnIcon" class="fas fa-sign-in-alt"></i>
                        </button>
                    </form>
                    <div id="loginStatus" class="mt-6 hidden p-4 rounded-xl text-[10px] font-black text-center uppercase tracking-widest animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const TUNNEL_URL = 'https://jgqw00mq-3000.inc1.devtunnels.ms';

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const statusDiv = document.getElementById('loginStatus');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        // Loading State
        statusDiv.classList.add('hidden');
        submitBtn.disabled = true;
        btnText.innerText = "VERIFYING...";
        btnIcon.className = "loader";

        try {
            const response = await fetch(`${TUNNEL_URL}/admin/login`, {
                method: 'POST',
                mode: 'cors', // ✅ CORS mode enable
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest', // ✅ Tunnel Bypass Header 1
                    'Bypass-Tunnel-Reminder': 'true'     // ✅ Tunnel Bypass Header 2
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminId', data.admin.id);
                
                statusDiv.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Access Granted`;
                statusDiv.className = "mt-6 p-4 rounded-xl text-[10px] font-black text-center uppercase tracking-widest bg-emerald-100 text-emerald-700 block";
                
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                throw new Error(data.message || 'Login Failed');
            }
        } catch (error) {
            statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> ${error.message}`;
            statusDiv.className = "mt-6 p-4 rounded-xl text-[10px] font-black text-center uppercase tracking-widest bg-red-100 text-red-700 block";
            submitBtn.disabled = false;
            btnText.innerText = "AUTHENTICATE";
            btnIcon.className = "fas fa-sign-in-alt";
        }
    });
</script>
</body>
</html>
