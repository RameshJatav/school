<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Admin Registration</h2>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="name" required placeholder="Amit"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email (Lowercase Only)</label>
                <input type="email" id="email" required placeholder="amit-admin@school.com"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Admin Pass Key</label>
                <input type="password" id="pass_key" required placeholder="Enter Secret Key"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">
                Register Admin
            </button>
        </form>

        <div id="message" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        // 1. APNA CLOUDFLARE/BACKEND URL YAHAN DALEIN
        const API_BASE_URL = "https://dramatic-carrying-islamic-tri.trycloudflare.com"; 

        const form = document.getElementById('registerForm');
        const msgDiv = document.getElementById('message');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset Message
            msgDiv.classList.add('hidden');
            btn.innerText = "Registering...";
            btn.disabled = true;

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value.toLowerCase(), // Force Lowercase
                password: document.getElementById('password').value,
                pass_key: document.getElementById('pass_key').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/admin/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                msgDiv.classList.remove('hidden');
                if (response.ok) {
                    msgDiv.innerText = "✅ " + (data.message || "Admin Registered!");
                    msgDiv.className = "mt-4 text-center text-sm font-medium text-green-600";
                    form.reset();
                } else {
                    msgDiv.innerText = "❌ Error: " + (data.message || "Something went wrong");
                    msgDiv.className = "mt-4 text-center text-sm font-medium text-red-600";
                }
            } catch (err) {
                msgDiv.classList.remove('hidden');
                msgDiv.innerText = "❌ Cannot connect to Server. Check Tunnel!";
                msgDiv.className = "mt-4 text-center text-sm font-medium text-red-600";
            } finally {
                btn.innerText = "Register Admin";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
